<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Createur de Map</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #222;
            color: white;
            text-align: center;
        }
        .container {
            margin-top: 30px;
        }
        .country {
            fill: #cccccc;
            stroke: #ffffff;
            stroke-width: 1;
            cursor: pointer;
            transition: fill 0.2s;
        }
        .country:hover {
            opacity: 0.8;
        }
        .palette {
            margin: 20px;
        }
        .color-btn {
            width: 40px;
            height: 40px;
            border: 2px solid white;
            border-radius: 50%;
            cursor: pointer;
            margin: 0 5px;
            display: inline-block;
        }
        .color-btn.selected {
            border-color: #00FF00; /* Vert pour montrer la couleur sélectionnée */
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <h1>Mon Générateur de Vidéos Mapping</h1>
    <p>Sélectionne une couleur, puis clique sur un pays !</p>

    <div class="palette">
        <div class="color-btn selected" style="background-color: #3b82f6;" data-color="#3b82f6"></div> <div class="color-btn" style="background-color: #ef4444;" data-color="#ef4444"></div> <div class="color-btn" style="background-color: #10b981;" data-color="#10b981"></div> <div class="color-btn" style="background-color: #f59e0b;" data-color="#f59e0b"></div> <div class="color-btn" style="background-color: #cccccc;" data-color="#cccccc"></div> </div>

    <div class="container">
        <svg width="400" height="400" viewBox="0 0 100 100">
            <path id="FR" class="country" d="M 30,40 L 50,40 L 50,60 L 30,60 Z" />
            <path id="DE" class="country" d="M 52,30 L 72,30 L 72,50 L 52,50 Z" />
            <path id="ES" class="country" d="M 20,65 L 40,65 L 40,85 L 20,85 Z" />
        </svg>
    </div>

    <script>
        // Couleur sélectionnée par défaut (Bleu)
        let currentColor = '#3b82f6';

        // Gérer la sélection de la couleur dans la palette
        const buttons = document.querySelectorAll('.color-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                // Enlever la classe 'selected' de l'ancien bouton
                document.querySelector('.color-btn.selected').classList.remove('selected');
                // L'ajouter au nouveau
                btn.classList.add('selected');
                // Changer la couleur active
                currentColor = btn.getAttribute('data-color');
            });
        });

        // Gérer le clic sur les pays
        const countries = document.querySelectorAll('.country');
        countries.forEach(country => {
            country.addEventListener('click', () => {
                // Appliquer la couleur active au pays cliqué
                country.style.fill = currentColor;
            });
        });
    </script>

</body>
</html>
